<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Register - Foodie Restaurant</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px 0;
    }

    .register-container {
      background: white;
      border-radius: 15px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
      padding: 40px;
      max-width: 450px;
      width: 100%;
    }

    .register-header {
      text-align: center;
      margin-bottom: 30px;
    }

    .register-header h1 {
      font-size: 28px;
      font-weight: bold;
      color: #333;
      margin-bottom: 10px;
    }

    .register-header p {
      color: #666;
      font-size: 14px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      font-weight: 600;
      color: #333;
      margin-bottom: 8px;
      display: block;
    }

    .form-group input {
      width: 100%;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      transition: 0.3s ease;
      box-sizing: border-box;
    }

    .form-group input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 10px rgba(102, 126, 234, 0.2);
    }

    .btn-register {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.3s ease;
    }

    .btn-register:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
    }

    .register-footer {
      text-align: center;
      margin-top: 20px;
      color: #666;
      font-size: 14px;
    }

    .register-footer a {
      color: #667eea;
      text-decoration: none;
      font-weight: 600;
    }

    .register-footer a:hover {
      text-decoration: underline;
    }

    .error-message {
      color: #dc3545;
      font-size: 14px;
      margin-top: 10px;
      display: none;
    }

    .loading {
      display: none;
    }
  </style>
</head>
<body>

<div class="register-container">
  <div class="register-header">
    <h1>🍴 Foodie</h1>
    <p>Join us! Create your account</p>
  </div>

  <form id="registerForm">
    <div class="form-group">
      <label for="name">👤 Full Name</label>
      <input type="text" id="name" placeholder="Enter your full name" required>
    </div>

    <div class="form-group">
      <label for="email">📧 Email</label>
      <input type="email" id="email" placeholder="Enter your email" required>
    </div>

    <div class="form-group">
      <label for="password">🔐 Password</label>
      <input type="password" id="password" placeholder="Enter password (min 6 characters)" required minlength="6">
    </div>

    <div class="form-group">
      <label for="confirmPassword">🔐 Confirm Password</label>
      <input type="password" id="confirmPassword" placeholder="Confirm password" required>
    </div>

    <div class="error-message" id="errorMessage"></div>

    <button type="submit" class="btn-register">
      <span id="btnText">Register</span>
      <span class="loading" id="loading">
        <span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span>
        Creating account...
      </span>
    </button>
  </form>

  <div class="register-footer">
    Already have an account? <a href="login.html">Login here</a>
  </div>

  <div class="register-footer" style="margin-top: 30px; padding-top: 20px; border-top: 1px solid #eee;">
    <a href="index.html">← Back to Home</a>
  </div>
</div>

<script src="js/auth.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
// Check if already logged in
if (isLoggedIn()) {
  window.location.href = "index.html";
}

// Handle register form submission
document.getElementById("registerForm").addEventListener("submit", async (e) => {
  e.preventDefault();

  const name = document.getElementById("name").value;
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  const confirmPassword = document.getElementById("confirmPassword").value;
  const errorMessage = document.getElementById("errorMessage");
  const btnText = document.getElementById("btnText");
  const loading = document.getElementById("loading");

  errorMessage.style.display = "none";
  errorMessage.textContent = "";

  // Validate passwords match
  if (password !== confirmPassword) {
    errorMessage.textContent = "❌ Passwords do not match";
    errorMessage.style.display = "block";
    return;
  }

  btnText.style.display = "none";
  loading.style.display = "inline";

  try {
    await register(name, email, password);
    
    // Redirect to home
    window.location.href = "index.html";
  } catch (err) {
    errorMessage.textContent = err.message;
    errorMessage.style.display = "block";
    btnText.style.display = "inline";
    loading.style.display = "none";
  }
});
</script>

</body>
</html>
