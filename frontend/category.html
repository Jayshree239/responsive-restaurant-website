<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Foodie Restaurant - Category</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background-color: #f8f9fa;
    }

    .menu-header {
      background: url('https://images.unsplash.com/photo-1600891964599-f61ba0e24092') center/cover;
      color: white;
      padding: 80px 0;
      text-align: center;
    }

    .menu-card {
      transition: 0.3s ease;
      border-radius: 15px;
      overflow: hidden;
    }

    .menu-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 8px 25px rgba(0,0,0,0.2);
    }

    .price {
      color: #d35400;
      font-weight: bold;
      font-size: 18px;
    }

    h2 {
      margin-top: 60px;
      margin-bottom: 30px;
      font-weight: bold;
      text-align: center;
    }

    .menu-card {
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    .menu-card .card-body {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .btn-add-cart {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      padding: 10px 15px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      transition: 0.3s ease;
      margin-top: auto;
    }

    .btn-add-cart:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
      color: white;
      text-decoration: none;
    }
  </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand fw-bold" href="index.html">🍴 Foodie</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="menu.html">Menu</a></li>
        <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
        <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
        <!-- User menu will be added here by auth.js -->
      </ul>
    </div>
  </div>
</nav>

<section class="menu-header">
  <h1 class="display-4" id="categoryTitle">Category</h1>
</section>

<div class="container mt-5">
  <div class="row" id="categoryContainer"></div>
</div>

<footer class="bg-dark text-white text-center py-3 mt-5">
  <p class="mb-0">© 2026 Foodie Restaurant | All Rights Reserved</p>
</footer>

<!-- JS: Fetch menu by category -->
<script src="js/auth.js"></script>
<script src="js/cart.js"></script>

<script>
  // Get category from URL (e.g., ?category=Starter)
  const params = new URLSearchParams(window.location.search);
  const category = params.get("category") || "Starter"; // default Starter

  // Set heading
  document.getElementById("categoryTitle").innerText = category;

  // Fetch menu items
  fetch("/api/menu")
    .then(res => res.json())
    .then(data => {
      const filtered = data.filter(item => item.category === category);
      const container = document.getElementById("categoryContainer");

      filtered.forEach(item => {
        const card = `
          <div class="col-md-4 mb-4">
            <div class="card menu-card">
              <img src="${item.image}" class="card-img-top" height="220">
              <div class="card-body">
                <h5>${item.name}</h5>
                <p>${item.description}</p>
                <p class="price">₹ ${item.price}</p>
                <button class="btn-add-cart" onclick="handleAddToCart('${item._id}', '${item.name}', ${item.price})">
                  🛒 Add to Cart
                </button>
              </div>
            </div>
          </div>
        `;
        container.innerHTML += card;
      });
    })
    .catch(error => console.log("Error:", error));

  // Handle add to cart
  function handleAddToCart(menuId, name, price) {
  if (!isLoggedIn()) {
    if (confirm("Please login first to add items to cart. Would you like to login now?")) {
      window.location.href = "login.html";
    }
    return;
  }

  addToCart(menuId, name, price); // ✅ correct usage

  // Update UI safely
  if (typeof updateCartBadge === "function") updateCartBadge();
  if (typeof updateNavbar === "function") updateNavbar();

  showCartNotification(`✅ ${name} added to cart`);
}
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
