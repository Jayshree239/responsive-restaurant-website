<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Orders - Foodie Restaurant</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background-color: #f8f9fa;
    }

    .orders-header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 60px 0;
      text-align: center;
    }

    .orders-container {
      max-width: 1000px;
      margin: 40px auto;
    }

    .order-card {
      background: white;
      border-radius: 15px;
      padding: 25px;
      margin-bottom: 25px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
      border: 1px solid #e9ecef;
    }

    .order-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      padding-bottom: 15px;
      border-bottom: 2px solid #f8f9fa;
    }

    .order-id {
      font-size: 18px;
      font-weight: 600;
      color: #333;
    }

    .order-status {
      padding: 5px 15px;
      border-radius: 20px;
      font-size: 14px;
      font-weight: 600;
      text-transform: uppercase;
    }

    .status-placed {
      background: #fff3cd;
      color: #856404;
    }

    .status-confirmed {
      background: #d1ecf1;
      color: #0c5460;
    }

    .status-delivered {
      background: #d4edda;
      color: #155724;
    }

    .status-cancelled {
      background: #f8d7da;
      color: #721c24;
    }

    .order-details {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 20px;
    }

    .detail-item {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid #f8f9fa;
    }

    .detail-label {
      font-weight: 500;
      color: #666;
    }

    .detail-value {
      font-weight: 600;
      color: #333;
    }

    .order-items {
      margin-top: 20px;
    }

    .order-items h5 {
      color: #333;
      margin-bottom: 15px;
      font-size: 16px;
    }

    .item-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid #f8f9fa;
    }

    .item-name {
      font-weight: 500;
      color: #333;
    }

    .item-quantity {
      color: #666;
      font-size: 14px;
    }

    .item-price {
      font-weight: 600;
      color: #d35400;
    }

    .order-total {
      background: #f8f9fa;
      padding: 15px;
      border-radius: 8px;
      margin-top: 15px;
      text-align: right;
    }

    .order-total .total-amount {
      font-size: 20px;
      font-weight: bold;
      color: #d35400;
    }

    .empty-orders {
      text-align: center;
      padding: 80px 20px;
      background: white;
      border-radius: 15px;
      margin: 40px 0;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
    }

    .empty-orders h2 {
      color: #666;
      margin-bottom: 20px;
    }

    .empty-orders p {
      color: #888;
      margin-bottom: 30px;
    }

    .loading {
      text-align: center;
      padding: 60px 20px;
    }

    .error-message {
      color: #dc3545;
      padding: 15px;
      background: #f8d7da;
      border-radius: 5px;
      margin-bottom: 20px;
      display: none;
    }

    .navbar-nav {
      display: flex;
      gap: 10px;
    }
  </style>
</head>
<body>

<!-- 🔥 Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand fw-bold" href="index.html">🍴 Foodie</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="menu.html">Menu</a></li>
        <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
        <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
        <!-- User menu will be added here by auth.js -->
      </ul>
    </div>
  </div>
</nav>

<!-- Header -->
<section class="orders-header">
  <h1>📋 My Orders</h1>
  <p>Track your order history and status</p>
</section>

<!-- Orders Container -->
<div class="container orders-container">
  <div class="error-message" id="errorMessage"></div>

  <div id="loading" class="loading">
    <div class="spinner-border text-primary" role="status">
      <span class="visually-hidden">Loading...</span>
    </div>
    <p class="mt-3">Loading your orders...</p>
  </div>

  <div id="ordersContainer"></div>
</div>

<!-- Footer -->
<footer class="bg-dark text-white text-center py-3 mt-5">
  <p class="mb-0">© 2026 Foodie Restaurant | All Rights Reserved</p>
</footer>

<script src="js/auth.js"></script>
<script src="js/cart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
// Redirect if not logged in
if (!isLoggedIn()) {
  window.location.href = "login.html";
}

// Load orders
async function loadOrders() {
  const loading = document.getElementById("loading");
  const ordersContainer = document.getElementById("ordersContainer");
  const errorMessage = document.getElementById("errorMessage");

  try {
    loading.style.display = "block";
    errorMessage.style.display = "none";

    const token = getToken();
    const response = await fetch("http://localhost:5000/api/order/my-orders", {
      method: "GET",
      headers: {
        "Authorization": `Bearer ${token}`,
        "Content-Type": "application/json"
      }
    });

    const data = await response.json();

    if (!response.ok) {
      throw new Error(data.message || "Failed to load orders");
    }

    displayOrders(data.orders);
  } catch (err) {
    console.error("❌ Error loading orders:", err);
    errorMessage.textContent = err.message;
    errorMessage.style.display = "block";
    ordersContainer.innerHTML = "";
  } finally {
    loading.style.display = "none";
  }
}

// Display orders
function displayOrders(orders) {
  const ordersContainer = document.getElementById("ordersContainer");

  if (!orders || orders.length === 0) {
    ordersContainer.innerHTML = `
      <div class="empty-orders">
        <h2>No orders yet</h2>
        <p>You haven't placed any orders yet. Start exploring our delicious menu!</p>
        <a href="menu.html" class="btn btn-primary btn-lg">Browse Menu</a>
      </div>
    `;
    return;
  }

  ordersContainer.innerHTML = orders.map(order => {
    const statusClass = getStatusClass(order.status);
    const formattedDate = new Date(order.createdAt).toLocaleDateString('en-IN', {
      year: 'numeric',
      month: 'long',
      day: 'numeric',
      hour: '2-digit',
      minute: '2-digit'
    });

    return `
      <div class="order-card">
        <div class="order-header">
          <div class="order-id">Order #${order._id.slice(-8).toUpperCase()}</div>
          <div class="order-status ${statusClass}">${order.status}</div>
        </div>

        <div class="order-details">
          <div>
            <div class="detail-item">
              <span class="detail-label">Order Date:</span>
              <span class="detail-value">${formattedDate}</span>
            </div>
            <div class="detail-item">
              <span class="detail-label">Phone:</span>
              <span class="detail-value">${order.phoneNumber}</span>
            </div>
          </div>
          <div>
            <div class="detail-item">
              <span class="detail-label">Delivery Address:</span>
              <span class="detail-value">${order.deliveryAddress}</span>
            </div>
            <div class="detail-item">
              <span class="detail-label">Payment Status:</span>
              <span class="detail-value">${order.paymentStatus || 'Pending'}</span>
            </div>
          </div>
        </div>

        <div class="order-items">
          <h5>Order Items:</h5>
          ${order.items.map(item => `
            <div class="item-row">
              <div class="item-name">${item.name}</div>
              <div class="item-quantity">Qty: ${item.quantity}</div>
              <div class="item-price">₹ ${(item.price * item.quantity).toFixed(2)}</div>
            </div>
          `).join('')}

          <div class="order-total">
            <div class="total-amount">Total: ₹ ${order.totalAmount.toFixed(2)}</div>
          </div>
        </div>
      </div>
    `;
  }).join('');
}

// Get status class for styling
function getStatusClass(status) {
  switch (status.toLowerCase()) {
    case 'placed': return 'status-placed';
    case 'confirmed': return 'status-confirmed';
    case 'delivered': return 'status-delivered';
    case 'cancelled': return 'status-cancelled';
    default: return 'status-placed';
  }
}

// Initialize
document.addEventListener("DOMContentLoaded", () => {
  loadOrders();
});
</script>

</body>
</html>
